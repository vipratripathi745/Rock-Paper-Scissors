<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors Game</title>
</head>
<body>

    <h1>Rock Paper Scissors</h1>

    <div class="buttons">
        <div class="box" id="rock">
            <img src="image/Rock.png" alt="Rock">
        </div>

        <div class="box" id="paper">
            <img src="image/paper.png" alt="Paper">
        </div>

        <div class="box" id="scissors">
            <img src="image/scissor.png" alt="Scissors">
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <div>
                <p id="your-score">0</p>
                <p>You</p>
            </div>

            <div>
                <p id="comp-score">0</p>
                <p>Computer</p>
            </div>
        </div>
    </div>

    <div class="msg-container">
        <p id="msg">Make your choice!</p>
    </div>

    <script src="javascr.js"></script>

</body>
</html>
